<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الصفحة غير موجودة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper: #f4ede0;
    --paper-deep: #ece1cb;
    --paper-shadow: #d9cbaa;
    --ink: #2a2119;
    --ink-soft: #6b5c48;
    --maroon: #6e1f27;
    --maroon-deep: #4a1319;
    --gold: #a9824f;
    --gold-light: #d9be8c;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100vh;
  }

  body{
    background:
      radial-gradient(ellipse at 50% 0%, #fbf7ec 0%, var(--paper) 55%, #e9dcc0 100%);
    color: var(--ink);
    font-family: 'Cairo', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 48px 20px;
  }

  /* faint paper fiber texture */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(115deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }

  .stage{
    position:relative;
    max-width: 480px;
    width:100%;
  }

  /* pages stacked beneath the main card */
  .stage::before,
  .stage::after{
    content:"";
    position:absolute;
    inset:0;
    background: var(--paper-deep);
    border: 1px solid var(--paper-shadow);
    border-radius: 2px;
  }
  .stage::before{
    transform: rotate(-2.2deg) translateY(6px);
    z-index: 1;
  }
  .stage::after{
    transform: rotate(1.6deg) translateY(3px);
    z-index: 2;
  }

  .page{
    position: relative;
    z-index: 3;
    background: var(--paper);
    border: 1px solid var(--paper-shadow);
    border-radius: 2px;
    padding: 56px 44px 40px;
    text-align: center;
    box-shadow:
      0 1px 2px rgba(74,19,25,0.08),
      0 18px 40px -18px rgba(42,33,25,0.35);
    overflow: hidden;
  }

  /* dog-eared folded corner */
  .page::before{
    content:"";
    position:absolute;
    top:0; right:0;
    width:0; height:0;
    border-style: solid;
    border-width: 0 34px 34px 0;
    border-color: transparent var(--paper-shadow) transparent transparent;
    filter: drop-shadow(-2px 2px 3px rgba(42,33,25,0.25));
  }
  .page::after{
    content:"";
    position:absolute;
    top:0; right:0;
    width:0; height:0;
    border-style: solid;
    border-width: 0 32px 32px 0;
    border-color: transparent var(--paper) transparent transparent;
  }

  .eyebrow{
    display:inline-block;
    font-family:'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--gold);
    border: 1px solid var(--gold-light);
    border-radius: 20px;
    padding: 5px 18px;
    margin-bottom: 26px;
  }

  .numeral{
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: 84px;
    line-height: 1;
    color: var(--maroon);
    margin: 0;
    letter-spacing: 4px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }

  .flourish{
    width: 140px;
    height: 22px;
    margin: 22px auto 26px;
    display:block;
  }
  .flourish path{
    fill:none;
    stroke: var(--gold);
    stroke-width: 1.4;
  }
  .flourish circle{
    fill: var(--maroon);
  }

  h1{
    font-family:'Amiri', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink);
    margin: 0 0 16px;
    line-height: 1.55;
  }

  p.desc{
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 2;
    margin: 0 0 34px;
    max-width: 360px;
    margin-inline: auto;
  }

  a.cta{
    position: relative;
    display: inline-block;
    font-family:'Cairo', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #f4ede0;
    background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-deep) 100%);
    text-decoration: none;
    padding: 14px 30px 20px;
    border-radius: 3px 3px 0 0;
    letter-spacing: 0.5px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 14px -6px rgba(74,19,25,0.55);
  }
  a.cta::after{
    content:"";
    position:absolute;
    bottom:-9px; right:0;
    width:0; height:0;
    border-style: solid;
    border-width: 9px 15px 0 0;
    border-color: var(--maroon-deep) transparent transparent transparent;
  }
  a.cta:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 18px -8px rgba(74,19,25,0.6);
  }
  a.cta:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .byline{
    margin-top: 34px;
    padding-top: 18px;
    border-top: 1px solid var(--paper-shadow);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--gold);
  }
  .byline span{
    color: var(--ink-soft);
    opacity: 0.75;
  }

  @media (max-width: 480px){
    .page{ padding: 46px 24px 34px; }
    .numeral{ font-size: 64px; }
    h1{ font-size: 21px; }
  }

  @media (prefers-reduced-motion: reduce){
    a.cta{ transition: none; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="page">
      <span class="eyebrow">خطأ ٤٠٤</span>

      <p class="numeral">٤٠٤</p>

      <svg class="flourish" viewBox="0 0 140 22" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 11 H55" />
        <path d="M85 11 H140" />
        <circle cx="70" cy="11" r="4" />
        <path d="M62 11 Q70 2 78 11 Q70 20 62 11 Z" />
      </svg>

      <h1>هذه الصفحة ضاعت بين السطور</h1>
      <p class="desc">
        يبدو أن الرابط الذي اتبعته يقود إلى فصل غير موجود،
        أو رواية لم تُكتب بعد. تفقد العنوان، أو عد إلى الصفحة الرئيسية
        لمتابعة القراءة من هناك.
      </p>

      <a class="cta" href="/">العودة إلى الرئيسية</a>

      <div class="byline">
        <span>من موقع الكاتب</span> محمد السيد عبد العزيز
      </div>
    </div>
  </div>

</body>
</html>
